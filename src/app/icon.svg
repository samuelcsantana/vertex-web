<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="vertexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" /> <!-- Tailwind sky-400 -->
      <stop offset="100%" stop-color="#818cf8" /> <!-- Tailwind indigo-400 -->
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" /> <!-- Tailwind slate-900 -->
      <stop offset="100%" stop-color="#020617" /> <!-- Tailwind slate-950 -->
    </linearGradient>
  </defs>
  
  <!-- Fundo com bordas arredondadas -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Linhas do "V" / Grafo (Agora na posição correta!) -->
  <path d="M 140 160 L 256 350 L 372 160" fill="none" stroke="url(#vertexGrad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Vértice Inferior (O núcleo do V) -->
  <circle cx="256" cy="350" r="32" fill="#818cf8" />
  
  <!-- Vértices Superiores -->
  <circle cx="140" cy="160" r="28" fill="#38bdf8" />
  <circle cx="372" cy="160" r="28" fill="#38bdf8" />
</svg>
